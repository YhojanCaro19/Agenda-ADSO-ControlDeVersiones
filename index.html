<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Agenda ADSO</title>
</head>
<body>
    <header>
        <h1>Agenda ADSO</h1>
        <nav>
            <ul>
                <li><a href="#">Inicio</a></li>
                <li><a href="#contacto">Contactos</a></li>
                <li><a href="#">Formulario De Inscripcion</a></li>
            </ul>
        </nav>
    </header>

    <section id="contacto">
        <h2>Contáctanos</h2>
        <p>¿Tienes alguna pregunta? Escríbenos y te responderemos pronto.</p>

        <form>
            <div>
                <label for="nombre">Nombre completo</label>
                <input type="text" id="nombre" placeholder="Tu nombre" />
            </div>

            <div>
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" placeholder="tucorreo@email.com" />
            </div>

            <div>
                <label for="mensaje">Mensaje</label>
                <textarea id="mensaje" placeholder="Escribe tu mensaje aquí..."></textarea>
            </div>

            <button type="submit">Enviar mensaje</button>
        </form>
    </section>

</body>
</html>
